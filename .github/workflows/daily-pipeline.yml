name: AI Daily Pipeline

on:
  schedule:
    - cron: '0 1 * * *'  # UTC 01:00 = 北京时间 09:00, 错开 launchd 08:00
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser httpx openai anthropic

      - name: Run pipeline
        env:
          AI_DAILY_DS_KEY: ${{ secrets.AI_DAILY_DS_KEY }}
          AI_DAILY_ANTHROPIC_KEY: ${{ secrets.AI_DAILY_ANTHROPIC_KEY }}
          AI_DAILY_SERVERCHAN_KEY: ${{ secrets.AI_DAILY_SERVERCHAN_KEY }}
        run: python3 pipeline/run.py

      - name: Deploy to GitHub Pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          mkdir -p deploy-out/data/daily
          cp prototype/index.html deploy-out/
          cp data/daily/latest.json deploy-out/data/daily/
          cp data/daily/index.json deploy-out/data/daily/
          cp data/daily/20*.json deploy-out/data/daily/ 2>/dev/null || true

          cd deploy-out
          git init
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "deploy: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')"
          git branch -m gh-pages
          git push "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" gh-pages -f
