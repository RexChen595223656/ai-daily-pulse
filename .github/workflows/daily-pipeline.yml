name: AI Daily Pipeline

on:
  schedule:
    # UTC 00:00 = 北京时间 08:00
    - cron: '0 0 * * *'
  workflow_dispatch:  # 手动触发

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser httpx openai anthropic

      - name: Run pipeline
        env:
          AI_DAILY_DS_KEY: ${{ secrets.AI_DAILY_DS_KEY }}
          AI_DAILY_ANTHROPIC_KEY: ${{ secrets.AI_DAILY_ANTHROPIC_KEY }}
          AI_DAILY_SERVERCHAN_KEY: ${{ secrets.AI_DAILY_SERVERCHAN_KEY }}
        run: python3 pipeline/run.py

      - name: Assemble publish directory
        run: |
          mkdir -p publish/data/daily
          cp prototype/index.html publish/
          cp data/daily/latest.json publish/data/daily/
          cp data/daily/index.json publish/data/daily/
          cp data/daily/20*.json publish/data/daily/ 2>/dev/null || true

      - name: Deploy to GitHub Pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -x
          cd publish
          git init
          git checkout -b gh-pages
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "deploy: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git push -f origin gh-pages
